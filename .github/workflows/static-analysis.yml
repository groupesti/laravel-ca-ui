name: Static Analysis

on: [push, pull_request]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    name: PHPStan

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Configure Satis repository
        run: |
          composer config repositories.groupesti composer https://package-app.com
          composer config http-basic.package-app.com "${{ secrets.SATIS_USER }}" "${{ secrets.SATIS_PASSWORD }}"

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse
